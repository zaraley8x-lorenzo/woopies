<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royale High ID</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<!-- FANCY FONT -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">


<style>
body{
   background: #eac4cf;
   font-family: 'Poppins', sans-serif;
}

/* SIDEBAR */
.sidebar{
   background: linear-gradient(#6ec1e4,#2aa3d6);
   height: 100vh;
   text-align: center;
   padding: 20px;
}


.logo img{
   width:120px;
}


.nav-link{
   color:white;
   font-size:18px;
   padding:12px;
   border-top:1px solid rgba(255,255,255,0.3);
}


/* ID CARD */
.card-id{
   background: linear-gradient(180deg,#ff9ecb,#ffd9f2);
   border-radius:25px;
   padding:25px;
   box-shadow:0 15px 30px rgba(0,0,0,0.3);
   position:relative;
   border:5px solid white;
}


/* HEADER */
.header{
   display:flex;
   align-items:center;
   justify-content:space-between;
}


.header img{
   height:60px;
}


.title{
   font-family:'Great Vibes',cursive;
   font-size:40px;
   color:white;
   text-shadow:2px 2px 10px #ff69b4;
}


/* LACE LINE */
.lace{
   height:15px;
   background:url('https://png.pngtree.com/png-clipart/20221009/original/pngtree-white-lace-border-png-image_8674976.png');
   background-size:contain;
}


/* LABEL */
.label{
   background:#ff6fa5;
   color:white;
   padding:5px 15px;
   border-radius:20px;
   font-size:13px;
   display:inline-block;
}


/* INPUT STYLE */
.input-box{
   background:#e0f7ff;
   height:35px;
   border-radius:20px;
   margin-bottom:15px;
   border:2px solid #bdefff;
}


/* DIAMOND */
.diamond{
   width:90px;
}


/* HEART FRAME */
.heart-frame{
   width:170px;
   height:170px;
   border:6px solid gold;
   border-radius:50%;
   overflow:hidden;
   background:white;
   margin:auto;
}


.heart-frame img{
   width:100%;
   height:100%;
   object-fit:cover;
}


/* ID NUMBER */
.id-number{
   background:#ff6fa5;
   color:white;
   text-align:center;
   padding:10px;
   border-radius:15px;
   font-weight:bold;
   margin-top:20px;
   font-size:18px;
}


/* SPARKLE EFFECT */
.card-id::after{
   content:"";
   position:absolute;
   top:0;
   left:0;
   width:100%;
   height:100%;
   background: url('https://www.transparenttextures.com/patterns/stardust.png');
   opacity:0.3;
   pointer-events:none;
}
</style>
</head>


<body>


<div class="container-fluid">
<div class="row">


<!-- SIDEBAR -->
<div class="col-md-3 sidebar">


   <div class="logo">
       <img src="https://static.wikia.nocookie.net/logopedia/images/9/9e/Royale_High_2018.png/revision/latest/scale-to-width-down/200?cb=20230624134118">
   </div>


   <a class="nav-link" href="#">DASHBOARD</a>
   <a class="nav-link" href="#">NOTEBOOKS</a>
   <a class="nav-link" href="#">TASKS</a>
   <a class="nav-link" href="#">PROFILE</a>
   <a class="nav-link" href="#">LOGOUT</a>


</div>


<!-- MAIN -->
<div class="col-md-9 d-flex justify-content-center align-items-center">


<div class="card-id col-md-8">


   <!-- HEADER -->
   <div class="header">
       <img src="https://static.wikia.nocookie.net/logopedia/images/8/8b/Royale_High_2023.png/revision/latest/scale-to-width-down/300?cb=20230624134302">
       <div class="title">Student ID Card</div>
   </div>


   <div class="lace my-2"></div>


   <div class="row mt-3">


       <!-- LEFT -->
       <div class="col-md-7">


           <div class="label">Student Name</div>
           <div class="input-box"></div>


           <div class="label">Grade Level</div>
           <div class="input-box"></div>


           <img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" class="diamond">


       </div>


       <!-- RIGHT -->
       <div class="col-md-5 text-center">


           <div class="heart-frame">
               <img id="preview" src="default.jpg">
           </div>


           <br>
           <input type="file" id="fileInput" accept="image/*">


       </div>


   </div>


   <div class="id-number">ID No. SN654321</div>


</div>
</div>


</div>
</div>


<script>
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');


fileInput.addEventListener('change', function(event){
   const file = event.target.files[0];
   if(file){
       const reader = new FileReader();
       reader.onload = function(e){
           preview.src = e.target.result;
       };
       reader.readAsDataURL(file);
   }
});
</script>


</body>
</html>

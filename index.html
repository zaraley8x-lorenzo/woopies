<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>


<style>
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;


        background: url("https://static.wixstatic.com/media/0aae1e_736ab1b5bf2a487da35e08475f5ae76b~mv2.jpg/v1/fill/w_1901,h_860,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/0aae1e_736ab1b5bf2a487da35e08475f5ae76b~mv2.jpg") no-repeat center center/cover;
        font-family: 'Poppins', sans-serif;
        position: relative;
    }


    body::before{
        content: "";
        position: absolute;
        inset: 0;


        background: linear-gradient(
            rgba(255, 200, 230, 0.5),
            rgba(200, 220, 255, 0.5)
        );


        backdrop-filter: blur(3px);
        z-index: 0;
    }


    .card{
        position: relative;
        z-index: 1;


        width: 400px;
        padding: 30px;
        border-radius: 30px;


        background: rgba(255, 180, 220, 0.85);
        border: 4px solid #ffd48e;


        box-shadow:
            0 0 20px rgba(255, 180, 220, 0.6),
            0 10px 30px rgba(0,0,0,0.2);


        text-align: center;
    }


    .title{
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        color: white;


        text-shadow:
            0 0 10px #ffb6e6,
            0 0 20px #ffd6f5;


        margin-bottom: 10px;
    }


    .sub{
        color: white;
        font-size: 0.9rem;
        margin-bottom: 15px;
    }


    label{
        display: block;
        text-align: left;
        margin-top: 12px;
        font-size: 0.85rem;
    }


    input{
        width: 100%;
        padding: 10px;
        border-radius: 15px;
        border: none;
        margin-top: 5px;


        background: rgba(255,255,255,0.8);  
    }


    button{
        width: 100%;
        margin-top: 15px;
        padding: 10px;


        border: none;
        border-radius: 20px;


        background: linear-gradient(135deg, #6ee7df, #7dd3fc);
        color: white;
        font-weight: 600;


        box-shadow: 0 0 10px rgba(125, 211, 252, 0.8);


        transition: 0.3s;
    }


    button:hover{
        transform: scale(1.05);
    }


    #result{
        margin-top: 10px;
        font-size: 0.9rem;
    }


    .form-check{
        text-align: left;
        margin-top: 10px;
    }
   
    details{
        margin-top: 10px;
        font-size: 0.85rem;
        color: #ffffff;
    }


    summary{
        cursor: pointer;
        font-weight: 500;
    }
</style>
   
<body>
    <div class="card">


    <header>
        <h1 class="title">Royal Login</h1>
        <p class="sub">Welcome back, Your Highness!<br>Please enter your username and password.</p>
        <details ontoggle="toggleMessage()">
        <summary class="text-center">Instructions</summary>
        <p>
            Correct credentials will grant access.
        </p>
    </details>
    </header>


    <form onsubmit="login(event)" novalidate>


        <label>
            Username
            <input type="text" id="username" placeholder="Username" required>
        </label>


        <label>
            Password
            <input type="password" id="password" placeholder="Min. 6 characters" required>
        </label>


        <button type="submit" class="btn">Login</button>
        <div id="result"></div>


        <div class="form-check mt-2">
            <input type="checkbox" id="loggedin" class="form-check-input">
            <label for="loggedin" class="form-check-label">Stay Logged In</label>
        </div>


    </form>


</div>


<script>
    let correctUsername = "Sukunas#1fan";
    let correctPassword = "123456";
    let attempt_counter = 0;


    window.onload = function () {
        let savedUser = localStorage.getItem("savedUsername");
        if (savedUser) {
            alert("Welcome back, " + savedUser + " 😌");
            window.location.href = "notebooks.html";
        }
    }


    function login(event) {
        event.preventDefault();
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;
        let result = document.getElementById("result");
        if (user === "" || pass === "") {
            alert("Please fill in all fields!");
            result.innerHTML = "⚠️ Missing input";
            return;
        }
        if (user === correctUsername && pass === correctPassword) {
        result.innerHTML = "✅ Access Granted";
        alert("Welcome, " + user + "!");
        attempt_counter = 0;
        let stayLoggedIn = document.getElementById("loggedin").checked;
        if (stayLoggedIn) {
            localStorage.setItem("savedUsername", user);
        } else {
            localStorage.removeItem("savedUsername");
        }
        window.location.href = "notebooks.html";
    }
        else {
            attempt_counter++;
            result.innerHTML =
                "❌ Incorrect username/password. Attempt " + attempt_counter + " of 3";
            alert("Invalid username or password!");
            if (attempt_counter >= 3) {
                alert("Too many failed attempts! Access locked.");
                document.querySelector("button").disabled = true;
            }
        }
    }
</script>
</body>
</html>
